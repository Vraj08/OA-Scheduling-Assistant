# Copy this file to `.streamlit/secrets.toml` and fill in your values.

# Google Sheet URL (the schedule spreadsheet)
SHEET_URL = "https://docs.google.com/spreadsheets/d/<SPREADSHEET_ID>/edit"

# Optional debug flags
hours_debug = false

# Supabase (optional; recommended for approvals/audit log)
SUPABASE_URL = "https://<your-project>.supabase.co"
SUPABASE_KEY = "<your-supabase-anon-or-service-key>"

# Approver password (used only when the current user is an approver name)
APPROVER_PASSWORD = "change-me"

# Google service account JSON (paste fields from your service account key)
[gcp_service_account]
type = "service_account"
project_id = "<project_id>"
private_key_id = "<private_key_id>"
private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
client_email = "<service-account-email>"
client_id = "<client_id>"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/<service-account-email>"
universe_domain = "googleapis.com"
